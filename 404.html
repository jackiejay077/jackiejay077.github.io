<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="The requested file could not be located."
  >

  <title>404 — File Not Found</title>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/content.css">

  <link
    rel="icon"
    type="image/svg+xml"
    href="assets/icons/favicon.svg?v=2"
  >

  <style>
    .error-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .error-panel {
      width: min(680px, 100%);
      padding: 40px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .error-code {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .error-title {
      margin: 0;
      color: var(--text-primary);
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
    }

    .error-message {
      max-width: 520px;
      margin: 26px 0 0;
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.75;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .error-link {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--border);
      color: var(--text-primary);
      text-decoration: none;
    }

    .error-link:hover,
    .error-link:focus-visible {
      border-color: var(--teal);
      outline: none;
    }

    .error-link-primary {
      border-color: var(--teal);
      color: var(--teal);
    }
  </style>
</head>

<body>
  <main class="error-page">
    <section class="error-panel">
      <p class="error-code mono">
        SYSTEM STATUS / FILE ABSENT
      </p>

      <h1 class="error-title">404</h1>

      <p class="error-message">
        The requested document could not be located. It may have been
        moved, renamed, archived, or placed inside an accidental
        framework nested inside another framework.
      </p>

      <div class="error-actions">
        <a
          class="error-link error-link-primary mono"
          href="/"
        >
          Return to overview
        </a>

        <a
          class="error-link mono"
          href="/#frameworks"
        >
          View frameworks
        </a>
      </div>
    </section>
  </main>
</body>
</html>
