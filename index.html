
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jacqueline Jiang | AI Safety Analyst</title>

  <style>
    :root {
      --background: #090d0f;
      --panel: #101619;
      --border: #293337;
      --text-primary: #f1f5f4;
      --text-secondary: #a2aead;
      --teal: #24b8a6;
      --success: #8fcb63;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--background);
      color: var(--text-primary);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(760px, 100%);
      padding: 48px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .status {
      margin-bottom: 24px;
      color: var(--success);
      font-family: monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    p {
      max-width: 620px;
      margin: 0;
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .accent {
      color: var(--teal);
    }

    footer {
      margin-top: 48px;
      color: var(--text-secondary);
      font-family: monospace;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <main>
    <div class="status">● System initialization in progress</div>

    <h1>Jacqueline<br><span class="accent">Jiang</span></h1>

    <p>
      AI Safety Analyst focused on adversarial evaluation,
      multimodal model behavior, and trust and safety systems.
    </p>

    <footer>
      Portfolio architecture under construction.
    </footer>
  </main>
</body>
</html>
